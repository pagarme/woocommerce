services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: woo-pagarme-wp
    restart: unless-stopped
    ports:
      - "${WP_PORT:-80}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', true);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', 'development');
    volumes:
      - wordpress_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/woo-pagarme-payments
    depends_on:
      db:
        condition: service_healthy
    # No Linux, descomente a linha abaixo para o XDebug alcancar a IDE no host.
    # No macOS/Windows com Docker Desktop, host.docker.internal ja funciona nativamente
    # e essa linha QUEBRA a resolucao (aponta pra 172.17.0.1 = gateway da VM, nao o host).
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    networks:
      - woo-pagarme

  db:
    image: mariadb:11
    container_name: woo-pagarme-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - woo-pagarme

  wp-cli:
    image: wordpress:cli-php8.4
    container_name: woo-pagarme-cli
    profiles: ["tools"]
    user: "33:33"
    depends_on:
      wordpress:
        condition: service_started
      db:
        condition: service_healthy
    volumes:
      - wordpress_data:/var/www/html
      - ../:/var/www/html/wp-content/plugins/woo-pagarme-payments
      - ./init-wp.sh:/init-wp.sh:ro
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WP_URL: "${WP_URL:-http://woo.localhost}"
    entrypoint: ["sh", "/init-wp.sh"]
    networks:
      - woo-pagarme

  phpmyadmin:
    image: phpmyadmin:5
    container_name: woo-pagarme-pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy
    networks:
      - woo-pagarme

volumes:
  wordpress_data:
  db_data:

networks:
  woo-pagarme:
    driver: bridge
